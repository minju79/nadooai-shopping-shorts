<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼핑 쇼츠 공장 진단 페이지</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  :root{
    --blue:#3182F6; --blue-hover:#1B64DA; --blue-light:#EBF3FF;
    --g100:#F2F4F6; --g200:#E5E8EB; --g500:#8B95A1; --g600:#6B7684; --g900:#191F28;
    --red:#F04452; --red-bg:#FFF0F0; --green:#00C471; --green-bg:#E8FBF3;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#F9FAFB;font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;color:var(--g900)}
  .wrap{max-width:560px;margin:0 auto;padding:20px 20px 60px}
  h1{font-size:24px;font-weight:700;margin:16px 0 4px}
  .sub{font-size:15px;color:var(--g600);margin:0 0 20px}
  .card{background:#fff;border:1px solid var(--g100);border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px}
  .card h2{font-size:18px;font-weight:700;margin:0 0 4px}
  .desc{font-size:14px;color:var(--g600);margin:0 0 14px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--g100);font-size:15px}
  .row:last-child{border-bottom:none}
  .row b{font-weight:600}
  input,textarea{width:100%;border:1.5px solid var(--g200);border-radius:10px;padding:14px 16px;font-size:16px;font-family:inherit;outline:none;margin-bottom:10px}
  input:focus,textarea:focus{border-color:var(--blue)}
  textarea{min-height:96px;resize:vertical}
  button{width:100%;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:14px 20px;font-size:16px;font-weight:600;cursor:pointer;transition:background .15s}
  button:hover{background:var(--blue-hover)}
  button:disabled{background:var(--g200);color:var(--g500);cursor:wait}
  .out{margin-top:12px;font-size:15px;line-height:1.6;word-break:break-all}
  .ok{background:var(--green-bg);color:#046C46;border-radius:10px;padding:14px}
  .err{background:var(--red-bg);color:var(--red);border-radius:10px;padding:14px;white-space:pre-wrap}
  .item{padding:12px 0;border-bottom:1px solid var(--g100)}
  .item:last-child{border-bottom:none}
  .item .t{font-weight:600}
  .item .m{font-size:14px;color:var(--g600)}
  a{color:var(--blue);text-decoration:none;font-weight:600}
  .badge{display:inline-block;background:var(--blue-light);color:var(--blue);border-radius:100px;padding:4px 10px;font-size:12px;font-weight:700;margin-bottom:8px}
</style>
</head>
<body>
<div class="wrap">
  <h1>쇼핑 쇼츠 공장 진단</h1>
  <p class="sub">여기서 초록불이면 엔진(서버)은 정상 → 문제는 런처 화면 쪽입니다.<br>여기서도 빨간불이면 → 서버 터미널 창의 오류 메시지를 확인하세요.</p>

  <!-- 0. 상태 점검 -->
  <div class="card">
    <span class="badge">STEP 0</span>
    <h2>키 · 부품 상태</h2>
    <p class="desc">페이지를 열면 자동으로 점검합니다.</p>
    <div id="health"><div class="row"><span>불러오는 중…</span></div></div>
  </div>

  <!-- 1. 쿠팡 -->
  <div class="card">
    <span class="badge">엔진 ①</span>
    <h2>쿠팡 상품 검색</h2>
    <p class="desc">상품명·가격·파트너스 링크가 나오면 성공</p>
    <input id="cpKeyword" value="휴대용 선풍기">
    <button onclick="testCoupang(this)">쿠팡 검색 테스트</button>
    <div class="out" id="cpOut"></div>
  </div>

  <!-- 2. 대본 변환 -->
  <div class="card">
    <span class="badge">엔진 ②</span>
    <h2>대본 변환 (중국어 → 15초 홈쇼핑)</h2>
    <p class="desc">훅과 완성 대본이 나오면 성공</p>
    <textarea id="cvText">家人们 今天带来爆款 多功能切菜器 不锈钢刀片一机五用 切丝切片都可以 还带沥水篮 原价59.9 今天只要29.9</textarea>
    <input id="cvPrice" value="19900" placeholder="한국 판매가(원) — 비워도 됩니다">
    <button onclick="testConvert(this)">대본 변환 테스트</button>
    <div class="out" id="cvOut"></div>
  </div>

  <!-- 3. 틱톡 -->
  <div class="card">
    <span class="badge">엔진 ③</span>
    <h2>틱톡 검색 (크롤러)</h2>
    <p class="desc">크롬 창이 새로 뜨고 15~40초 걸립니다. 캡차가 보이면 그 창에서 직접 풀어주세요.</p>
    <input id="ttKeyword" value="便携风扇">
    <button onclick="testTikTok(this)">틱톡 검색 테스트</button>
    <div class="out" id="ttOut"></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);

// ── 자동 보정 1: 이 파일을 더블클릭(file://)으로 열거나 다른 포트에서 열어도,
//    서버(localhost:3000)만 켜져 있으면 동작하도록 요청 주소를 자동으로 맞춰줍니다.
const BASE = location.port === '3000' ? '' : 'http://localhost:3000';
const _fetch = window.fetch.bind(window);
window.fetch = (url, opt) => _fetch((url + '').startsWith('/') ? BASE + url : url, opt);

// ── 자동 보정 2: 알 수 없는 영어 오류를 사람 말로 번역
const nice = (m) => (m + '').includes('Failed to fetch')
  ? '서버(발전기)가 꺼져 있습니다. 같은 폴더의 「공장가동.bat」를 더블클릭해 서버를 켠 뒤 다시 시도하세요.'
  : m;
const fail = (el, msg) => { el.innerHTML = '<div class="err">❌ ' + nice(msg) + '</div>'; };
const busy = (btn, on, label) => { btn.disabled = on; btn.textContent = on ? '테스트 중… (창을 끄지 마세요)' : label; };

// STEP 0: 상태 점검
(async () => {
  try {
    const r = await fetch('/api/health');
    const s = await r.json();
    $('health').innerHTML = Object.entries(s)
      .map(([k, v]) => '<div class="row"><span>' + k.replaceAll('_', ' ') + '</span><b>' + v + '</b></div>')
      .join('');
  } catch (e) {
    fail($('health'), '상태 확인 실패: ' + e.message);
  }
})();

// 엔진 ①: 쿠팡
async function testCoupang(btn) {
  const out = $('cpOut'); out.innerHTML = ''; busy(btn, true, '쿠팡 검색 테스트');
  try {
    const r = await fetch('/api/search?keyword=' + encodeURIComponent($('cpKeyword').value) + '&limit=3');
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || r.status);
    if (!data.length) return fail(out, '오류는 없는데 결과가 0건입니다. 다른 검색어로 시도해 보세요.');
    out.innerHTML = '<div class="ok">✅ 엔진 ① 정상 — ' + data.length + '개 상품</div>' +
      data.map(p => '<div class="item"><div class="t">' + p.productName + '</div>' +
        '<div class="m">' + Number(p.productPrice).toLocaleString('ko-KR') + '원 · <a href="' + p.productUrl + '" target="_blank">파트너스 링크</a></div></div>').join('');
  } catch (e) { fail(out, e.message); }
  busy(btn, false, '쿠팡 검색 테스트');
}

// 엔진 ②: 대본 변환
async function testConvert(btn) {
  const out = $('cvOut'); out.innerHTML = ''; busy(btn, true, '대본 변환 테스트');
  try {
    const body = { rawText: $('cvText').value };
    if ($('cvPrice').value.trim()) body.koreanPrice = Number($('cvPrice').value);
    const r = await fetch('/api/convert-script', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || r.status);
    out.innerHTML = '<div class="ok">✅ 엔진 ② 정상</div>' +
      '<div class="item"><div class="t">훅</div><div class="m">' + data.hook + '</div></div>' +
      '<div class="item"><div class="t">완성 대본</div><div class="m">' + data.full_script + '</div></div>' +
      '<div class="item"><div class="t">확인 필요</div><div class="m">' + data.needs_check + '</div></div>';
  } catch (e) { fail(out, e.message); }
  busy(btn, false, '대본 변환 테스트');
}

// 엔진 ③: 틱톡
async function testTikTok(btn) {
  const out = $('ttOut'); out.innerHTML = ''; busy(btn, true, '틱톡 검색 테스트');
  try {
    const r = await fetch('/api/tiktok-search?keyword=' + encodeURIComponent($('ttKeyword').value));
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || r.status);
    if (!data.length) return fail(out, '결과 0건 — 캡차 미해결이거나 틱톡 구조 변경 가능성. 한 번 더 시도해 보세요.');
    out.innerHTML = '<div class="ok">✅ 엔진 ③ 정상 — ' + data.length + '개 영상</div>' +
      data.map(v => '<div class="item"><div class="t">' + v.rank + '위 · 조회수 ' + v.viewsText + '</div>' +
        '<div class="m">' + v.title + ' · <a href="' + v.url + '" target="_blank">영상 보기</a></div></div>').join('');
  } catch (e) { fail(out, e.message); }
  busy(btn, false, '틱톡 검색 테스트');
}
</script>
</body>
</html>
